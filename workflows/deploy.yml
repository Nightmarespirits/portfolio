name: Deploy Next.js site to Pages

on:
  # Ejecuta la acción cuando haces 'push' a la rama `main`
  # Si tu rama principal se llama `master`, cámbialo abajo.
  push:
    branches: ["main"]

  # Permite ejecutar este flujo de trabajo manualmente desde la pestaña Actions
  workflow_dispatch:

# Configura los permisos para el GITHUB_TOKEN que permiten el despliegue en GH Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue concurrente a la vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Trabajo de construcción (Build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Construir proyecto estático
        run: npm run build

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Trabajo de despliegue (Deploy)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
